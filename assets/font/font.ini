# After downloading the required fonts and tools, generate the font atlas:
# cargo run -p atlaskit -- build assets/font/font.ini -o assets/font/font --msdfgen tmp/msdfgen.exe --msdf-atlas-gen tmp/msdf-atlas-gen.exe

Kind=mtsdf
DistanceRange=4
Width=512
Height=256
Margin=1

Msdfgen.Mode=mtsdf
Msdfgen.Range=4
Msdfgen.Size=40
Msdfgen.Autoframe=false
Msdfgen.YFlip=false
Msdfgen.Overlap=false
Msdfgen.FillRule=nonzero

MsdfAtlasGen.Mode=mtsdf
MsdfAtlasGen.Range=4
MsdfAtlasGen.Size=32
MsdfAtlasGen.OuterPadding=1
MsdfAtlasGen.Overlap=false

[Font:font]
Path=../../tmp/fonts/adventure/Adventure.otf
MsdfAtlasGen.Charset=font-ascii.txt

[Font:font]
Path=../../tmp/fonts/segoe-ui-symbol.ttf
MsdfAtlasGen.Charset=font-symbols.txt

[Sprite:panel.rounded]
Path=panel.svg
Margin=4
